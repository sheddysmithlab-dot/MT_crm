# Malwa CRM — FRESH deploy (backend + MySQL only)
# Frontend = File Manager static files → API at http://VPS_IP:8010
#
# Hostinger Compose URL:
#   https://raw.githubusercontent.com/sheddysmithlab-dot/MT_crm/main/docker-compose.yml
#
# Project name: mt-crm-api
#
# Environment (NO DATABASE_URL — built-in MySQL):
#   JWT_SECRET=long-random-secret
#   CORS_ORIGINS=https://crm.malwatrolley.com,http://200.97.171.119:8010
#   SEED_ADMIN_EMAIL=admin@malwatrolley.com
#   SEED_ADMIN_PASSWORD=Malwa#8224
#   MTCRM_API_PORT=8010
#   FORCE_DOCKER_MYSQL=1

name: mt-crm-api

services:
  mt_crm_mysql:
    image: mysql:8.0
    container_name: mt_crm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-mtcrm_root_change_me}
      MYSQL_DATABASE: malwa_crm
      MYSQL_USER: mtcrm
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mtcrm_pass_change_me}
    volumes:
      - mt_crm_mysql_data:/var/lib/mysql
      - ./backend/sql/malwa_crm_Data_base.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - mt_crm_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-mtcrm_root_change_me}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mt-crm-api:fresh-20260722
    container_name: mt_crm_api
    restart: unless-stopped
    depends_on:
      mt_crm_mysql:
        condition: service_healthy
    ports:
      - "${MTCRM_API_PORT:-8010}:8000"
    environment:
      APP_NAME: Malwa CRM API
      APP_ENV: production
      DEBUG: "false"
      API_PREFIX: /api
      BUILD_ID: fresh-20260722
      FORCE_DOCKER_MYSQL: "1"
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mtcrm_pass_change_me}
      DATABASE_URL: mysql+pymysql://mtcrm:${MYSQL_PASSWORD:-mtcrm_pass_change_me}@mt_crm_mysql:3306/malwa_crm?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-change-me-set-in-hostinger-env}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://crm.malwatrolley.com,http://200.97.171.119:8010}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@malwatrolley.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Malwa#8224}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Malwa Admin}
    networks:
      - mt_crm_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/live', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 90s

networks:
  mt_crm_net:
    name: mt_crm_net
    driver: bridge

volumes:
  mt_crm_mysql_data:
    name: mt_crm_mysql_data
