# Malwa CRM — BACKEND ONLY (Hostinger Docker Compose)
# Does not touch other projects: own network + unique container name + dedicated port.
#
# Hostinger Compose URL:
#   https://raw.githubusercontent.com/sheddysmithlab-dot/MT_crm/main/docker-compose.yml
#
# Project name in Hostinger UI: mt-crm-api  (or any unique name)
#
# Required environment variables (set in Hostinger Compose → Environment):
#   DATABASE_URL=mysql+pymysql://u808821982_Malwa_crm:PASSWORD@HPANEL_MYSQL_HOST:3306/u808821982_Malwa_crm?charset=utf8mb4
#   JWT_SECRET=long-random-secret
#   CORS_ORIGINS=https://crm.malwatrolley.com
#   SEED_ADMIN_PASSWORD=Malwa#8224
#
# MySQL host (IMPORTANT — Hostinger shared MySQL is NOT on the VPS):
#   ❌ host.docker.internal  → Connection refused (your error)
#   ❌ 127.0.0.1 / localhost → usually wrong from Docker
#   ✅ hostname from hPanel → Databases (e.g. srvXXXX.hstgr.io)
#   Also: hPanel → Remote MySQL → allow VPS IP 200.97.171.119
#
# Optional self-contained MySQL in Docker instead:
#   use docker-compose.mysql.yml (separate DB, not your hPanel DB)

name: mt-crm-api

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: mt-crm-api:latest
    container_name: mt_crm_api
    restart: unless-stopped
    ports:
      # Change 8010 if another app already uses it on this VPS
      - "${MTCRM_API_PORT:-8010}:8000"
    environment:
      APP_NAME: Malwa CRM API
      APP_ENV: production
      DEBUG: "false"
      API_PREFIX: /api
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-change-me-set-in-hostinger-env}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-10080}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://crm.malwatrolley.com}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@malwatrolley.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-Malwa#8224}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Malwa Admin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mt_crm_net
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/live', timeout=5)",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  mt_crm_net:
    name: mt_crm_net
    driver: bridge
