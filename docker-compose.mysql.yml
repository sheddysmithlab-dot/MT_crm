# Full stack with MySQL inside Docker (self-contained VPS)
# Usage: docker compose -f docker-compose.mysql.yml --env-file .env.docker up -d --build

services:
  mysql:
    image: mysql:8.0
    container_name: malwa_crm_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-malwa_crm}
      MYSQL_USER: ${MYSQL_USER:-crm_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - malwa_mysql_data:/var/lib/mysql
      - ./backend/sql/malwa_crm_Data_base.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - malwa_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: malwa_crm_api
    restart: unless-stopped
    environment:
      APP_NAME: Malwa CRM API
      APP_ENV: production
      DEBUG: "false"
      API_PREFIX: /api
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-crm_user}:${MYSQL_PASSWORD:-changeme}@mysql:3306/${MYSQL_DATABASE:-malwa_crm}?charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-long-random-secret-key}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "10080"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://crm.malwatrolley.com}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@malwatrolley.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe822!}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Malwa Admin}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - malwa_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: /api
        VITE_USE_API: "true"
    container_name: malwa_crm_web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - malwa_net

networks:
  malwa_net:
    driver: bridge

volumes:
  malwa_mysql_data:
